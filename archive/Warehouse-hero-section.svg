    <path class="guide-glint" d="M1252 782 H1418" stroke="#ff8a2e"/>
  </g>

  <g class="ui">
    <text class="headline" x="800" y="299" text-anchor="middle">
      <tspan x="800" dy="0">Warehouse radio traffic signals bottlenecks, exceptions, and delays.</tspan>
      <tspan class="subheader-text" x="800" dy="100.6">Memo turns that traffic <tspan class="headline-accent">into wall-to-wall operational visibility.</tspan></tspan>
    </text>

    <g transform="translate(649 510)">
      <rect width="362.4" height="74.4" rx="37.2" fill="url(#buttonFill)" stroke="url(#buttonStroke)" stroke-width="1.4"/>
      <rect x="12" y="12" width="338.4" height="50.4" rx="25.2" fill="none" stroke="#ffffff" stroke-opacity="0.04"/>
      <text class="cta-text" x="181.2" y="37.2" text-anchor="middle" dominant-baseline="central">Schedule a time to speak</text>
    </g>

    <!-- Proof lines: +85px vs prior gaps; "Rapid deployment" at x=683 -->
    <g transform="translate(0 678)">
      <g transform="translate(130 0)">
        <text class="subheadline" x="0" y="30">Your existing radios</text>
      </g>
      <g transform="translate(683 0)">
        <text class="subheadline" x="0" y="30">Rapid deployment</text>
      </g>
      <g transform="translate(1252 0)">
        <text class="subheadline" x="0" y="30">Fully on-prem</text>
      </g>
    </g>
  </g>

