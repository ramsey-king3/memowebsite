    <path class="hairline" d="M120 136 H1480"/>
    <path class="hairline" d="M120 782 H1480"/>
    <path class="hairline" d="M836 186 V746" opacity="0.44"/>
    <path class="hairline" d="M880 280 H1440" opacity="0.34"/>
    <path class="hairline" d="M880 640 H1440" opacity="0.26"/>
